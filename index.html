<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Temple World</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">

	<style>
		.game_canvas {
				height:100%;
				width: 100%;
				top: 0;
				left: 0;
			}
			.game_overlay {
				pointer-events: none;
				position: absolute;
				height:100%;
				width: 100%;
				top:0px;
				left:0px;
				z-index: 10;
			}
			.game_overlay_quad {
				position: absolute;
				display: grid;
				height:50%;
				width: 50%;
			}
			.game_overlay_hint {
				color:rgb(0, 72, 0);
				font-size: small;
			}
	</style>
	<body style="background-color: rgb(165, 165, 165);">
		<div id="info">
			<a href="about.html" style="color:green">Temple World <u>(read)</u></a>
			<span id="main-local-host-menu" style="display: none;">
				<u onclick="mainDoRecompile()" style="color:green" id="main_recompile_link">(recompile)</u>
				<u onclick="toggleDevMenu()" style="color:green">(devmenu)</u>
			</span>
		</div>
		<div id="main_canvas_holder">
			<canvas id="main_canvas" class="game_canvas"></canvas>
			<div class="game_overlay" >
				<div class="game_overlay_quad" style="right:0px; bottom:0px;">
					<p class="game_overlay_hint" style="text-align: right;">look</p>
				</div>
				<div class="game_overlay_quad" style="right:0px; top:0px;">
					<p id="controls-overlay-top-right" class="game_overlay_hint" style="align-self: end;text-align: right;">focus</p>
				</div>
				<div class="game_overlay_quad" style="left:0px; bottom:0px;">
					<p class="game_overlay_hint" style="text-align: left;">move</p>
				</div>
				<div class="game_overlay_quad" style="left:0px; top:0px;">
					<p id="controls-overlay-top-left" class="game_overlay_hint" style="align-self: end;">glide</p>
				</div>
				<div class="game_overlay_quad" style="width: 100%; height: 100%; left:0px; top:30px; ">
					<pre id="main-dev-console" class="game_overlay_hint" style="text-align: left;color:cornflowerblue">~</pre>
				</div>
			</div>
		</div>
		<div id="devmenu-overlay" style="position: absolute; right: 0; top: 0; width: 33%; height: 100%; background: rgba(0,0,0,0.9); color: white; display: none; z-index: 20; font-family: monospace; font-size: 12px; pointer-events: auto; overflow: hidden;">
			<div id="devmenu-content" style="width: 100%; height: 100%; background: transparent; color: inherit; padding: 10px; box-sizing: border-box; pointer-events: auto; overflow: auto;"></div>
		</div>

		<script type="importmap">
			{
				"imports": { 
					"three": "./three/build/three.module.js"
				}
			}
		</script>

		<script>
			function IsLocalHost() {
				if (window.location.href.includes("localhost:")) {
					return true;
				}
				return false;
			}
			function CheckLocalHost() {
				if (IsLocalHost()) {
					var el = document.getElementById("main-local-host-menu");
					el.style.display = 'inline';
				}
			}
			CheckLocalHost();

			function mainDoRecompile() {
				//alert("About to recompile...");
				main_recompile_link.innerText = "(compiling...)";
				fetch('src/browser/recompile.php')
				.then(res => res.text())
				.then(txt => {
					if (txt.trim() == "") {
						window.location.reload();
					} else {
						alert("Recompile:\n" + txt);
					}
				});
			}

			function toggleTreeItem(span) {
				var parent = span.parentElement;
				var children = parent.querySelector(':scope > .tree-children');
				if (!children) return;
				if (children.style.display === 'none') {
					children.style.display = 'block';
					span.textContent = span.textContent.replace('▶', '▼');
				} else {
					children.style.display = 'none';
					span.textContent = span.textContent.replace('▼', '▶');
				}
			}

            window.selectDevMenuTab = function(tab) {
                window.currentDevMenuTab = tab;
                var tabs = ['scene', 'focus', 'resources'];
                for (var i = 0; i < tabs.length; i++) {
                    var name = tabs[i];
                    var btn = document.getElementById('devmenu-tab-btn-' + name);
                    var content = document.getElementById('devmenu-tab-' + name);
                    if (!btn || !content) continue;
                    var active = (name === tab);
                    btn.style.background = active ? '#555' : 'transparent';
                    btn.style.color = active ? '#fff' : '#aaa';
                    content.style.display = active ? 'block' : 'none';
                }
            };

			function expandAllParents(element) {
				var parent = element.parentElement;
				while (parent && parent.id !== 'devmenu-content') {
					if (parent.classList.contains('tree-item')) {
						var children = parent.querySelector(':scope > .tree-children');
						var toggle = parent.querySelector(':scope > .tree-toggle');
						if (children && children.style.display === 'none') {
							children.style.display = 'block';
							if (toggle) {
								toggle.textContent = toggle.textContent.replace('▶', '▼');
							}
						}
						parent = parent.parentElement;
					} else {
						parent = parent.parentElement;
					}
				}
			}

			function jumpToItem(name) {
				var items = document.querySelectorAll('[data-name]');
				var found = false;
				for (var item of items) {
					var itemName = item.getAttribute('data-name');
					if (itemName === name) {
						expandAllParents(item);
						item.style.backgroundColor = '#444';
						item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
						found = true;
						setTimeout(() => { item.style.backgroundColor = ''; }, 2000);
						break;
					}
				}
				if (!found) console.log('Item not found: ' + name);
			}
		</script>


		<script type="module">

		<script type="module">

			import * as THREE from 'three';

			import { OrbitControls } from './three/build/OrbitControls.js';
			import { TempleWorld } from './content/temple_world.js'
			import { ControlFromWeb } from './content/controls/control_from_web.js'

			let renderer, scene, camera;
			var templeWorldInst = null;
			var isRedrawing = false;
			var isRedrawRequested = false;

			window.toggleDevMenu = () => {
				if (templeWorldInst && templeWorldInst.avatar && templeWorldInst.avatar.controls) {
					templeWorldInst.avatar.controls.isDevMode = !templeWorldInst.avatar.controls.isDevMode;
					templeWorldInst.avatar.controls.isDevModeChanged = true;
				}
			};

			window.currentDevMenuTab = 'scene';

			init_three();

            function request_redraw() {
				isRedrawRequested = true;
                render();
            }

			function init_temple() {
				var devElement = document.getElementById("main-dev-console")
				var devMenuOverlay = document.getElementById("devmenu-overlay")
				var devMenuContent = document.getElementById("devmenu-content")
				templeWorldInst = new TempleWorld(scene, camera, request_redraw, devElement, devMenuOverlay, devMenuContent);
				var webControl = new ControlFromWeb(renderer.domElement, templeWorldInst.controlGroup );

			}

			function init_three() {

				// renderer
				var targetCanvas = main_canvas;
				var bgShade = 161 / ( 255.0 * 2.0 );
				var bgColor = new THREE.Color();
				bgColor.set(bgShade, bgShade, bgShade);
				renderer = new THREE.WebGLRenderer( {
					canvas: targetCanvas,
					antialias: true } );
				renderer.setPixelRatio( window.devicePixelRatio );
				renderer.setSize( window.innerWidth, window.innerHeight );
				renderer.setClearColor(bgColor)
				//document.body.appendChild( renderer.domElement );

				// scene
				scene = new THREE.Scene();

				// camera
				camera = new THREE.PerspectiveCamera( 40, window.innerWidth / window.innerHeight, 1, 1000 );
				camera.position.set( 0, 0, 7 );
				scene.add(camera);

				// controls
				const useOrbitControls = false;
				if (useOrbitControls) {
					const controls = new OrbitControls( camera, renderer.domElement );
					controls.addEventListener( 'change', request_redraw );
					controls.minDistance =  2.5;
					controls.maxDistance = 12.5;
					controls.enablePan = false;
				}

                if (false) {
                    const loader = new THREE.TextureLoader()
                    const texture = loader.load( 'content/images/lewdo.png', () => { request_redraw(); } )
				    texture.colorSpace = THREE.SRGBColorSpace;

                    const geometry = new THREE.BoxGeometry();
                    const material = new THREE.MeshBasicMaterial( { map: texture } );
                    const mesh = new THREE.Mesh( geometry, material );
                    scene.add( mesh );
                }

				init_temple();

				// listener
				window.addEventListener( 'resize', onWindowResize );

				request_redraw();

			}

			function onWindowResize() {

				renderer.setSize( window.innerWidth, window.innerHeight );

				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();

				render();

			}

			function render() {
				if (isRedrawing) return false;
				isRedrawing = true;
				try {
					templeWorldInst.onPreRender();
					renderer.render( scene, camera );
					isRedrawing = false;
				} catch (ex) {
					isRedrawing = false;
					isRedrawRequested = false;
					console.warn("Rendering exception: " + ex);
					throw ex;
				}

			}

		</script>

	</body>
</html>
